services:
  - type: web
    name: worksheet-bot
    runtime: python
    repo: https://github.com/yourusername/worksheet-bot  # Change this
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
